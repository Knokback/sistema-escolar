<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feed</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

#feed{

display:flex;
flex-direction:column;
gap:20px;

}

.post{

background:#1e1e1e;

padding:15px;

border-radius:15px;

box-shadow:0 0 10px rgba(0,0,0,0.4);

}

.post-header{

display:flex;

align-items:center;

gap:12px;

margin-bottom:10px;

}

/* FOTO PERFIL */

.avatar-img{

width:50px;
height:50px;

border-radius:50%;

object-fit:cover;

cursor:pointer;

transition:0.2s;

}

.avatar-img:hover{

transform:scale(1.08);

}

/* NOME */

.post-header a{

color:#ff4444;

font-weight:bold;

text-decoration:none;

}

.post-header a:hover{

text-decoration:underline;

}

/* TEXTO */

.post-content{

margin-top:10px;
margin-bottom:10px;

line-height:1.5;

}

/* IMAGEM POST */

.post-image{

width:100%;

max-width:500px;

border-radius:12px;

cursor:pointer;

transition:0.2s;

}

.post-image:hover{

transform:scale(1.01);

}

/* MODAL */

#imageModal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

justify-content:center;
align-items:center;

z-index:9999;

cursor:pointer;

}

#expandedImage{

max-width:90%;
max-height:90%;

border-radius:12px;

}

.avatar-default{

display:flex;

align-items:center;
justify-content:center;

background:#ff4444;

color:white;

font-size:22px;
font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<div id="feed">

{% for post in posts %}

<div class="post">

<div class="post-header">

{% if post.avatar %}

<img
class="avatar-img"
src="{{ url_for('static', filename=post.avatar) }}"
onclick="abrirImagem(this.src)"
>

{% else %}

<div
class="avatar-img avatar-default"
onclick="abrirImagem('/static/img/default-avatar.png')"
>

{{ post.username[0]|upper }}

</div>

{% endif %}

<a class="username-link"
href="{{ url_for('perfil.perfil', user_id=post.user_id) }}">

@{{ post.username }}

</a>

</div>

<div class="post-content">

{{ post.content }}

</div>

{% if post.image %}

<img
class="post-image"
src="{{ url_for('static', filename=post.image) }}"
onclick="abrirImagem(this.src)"
>

{% endif %}

</div>

{% endfor %}

</div>

<!-- MODAL -->

<div id="imageModal" onclick="fecharImagem()">

<img id="expandedImage">

</div>

<script>

function abrirImagem(src){

let modal=document.getElementById(
"imageModal"
);

let imagem=document.getElementById(
"expandedImage"
);

imagem.src=src;

modal.style.display="flex";

}

function fecharImagem(){

document.getElementById(
"imageModal"
).style.display="none";

}

</script>

</body>
</html>
