<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Login - RedCareta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <h2>Login</h2>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">

        <input 
            type="text"
            name="username"
            placeholder="Usuário"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <p>
        Não tem conta?
        <a href="{{ url_for('auth.register') }}">Registrar</a>
    </p>

</body>

</html>
