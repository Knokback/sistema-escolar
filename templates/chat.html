<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<title>Chat - RedCareta 😜</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
margin:0;

display:flex;
flex-direction:column;

height:100vh;
}

/* HEADER */

#header{

background:#1a1a1a;

padding:15px;

text-align:center;

color:#ff4444;

font-size:24px;

font-weight:bold;

}

/* MENU */

#menu{

position:fixed;

top:10px;
right:10px;

display:flex;

gap:15px;

}

#menu a{

color:#ff4444;

text-decoration:none;

}

/* MENSAGENS */

#messages{

flex:1;

overflow-y:auto;

padding:15px;

display:flex;

flex-direction:column;

gap:10px;

}

.message{

background:#222;

padding:10px;

border-radius:10px;

}

.message-header{

display:flex;

align-items:center;

gap:10px;

margin-bottom:5px;

}

.message-header a{

color:#ff4444;

text-decoration:none;

font-weight:bold;

}

.avatar{

width:45px;
height:45px;

border-radius:50%;

object-fit:cover;

cursor:pointer;

}

.avatar-default{

width:45px;
height:45px;

border-radius:50%;

background:#ff4444;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

cursor:pointer;

}

/* INPUT */

#chat-form{

display:flex;

gap:10px;

padding:10px;

background:#1a1a1a;

}

#chat-form input{

flex:1;

padding:10px;

border:none;

border-radius:6px;

}

#chat-form button{

padding:10px 15px;

background:#ff4444;

border:none;

border-radius:6px;

color:white;

cursor:pointer;

}

/* MODAL */

#imageModal{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

justify-content:center;
align-items:center;

z-index:9999;

cursor:pointer;

}

#expandedImage{

max-width:90%;

max-height:90%;

border-radius:12px;

}

</style>

</head>

<body>

<div id="menu">

<a href="{{ url_for('home.home') }}">
🏠 Home
</a>

<a href="{{ url_for('perfil.perfil') }}">
👤 Perfil
</a>

</div>

<div id="header">

💬 Chat Público

</div>

<div id="messages">

{% if messages %}

{% for msg in messages %}

<div class="message">

<div class="message-header">

{% if msg.avatar %}

<img

class="avatar"

src="{{ url_for('static', filename=msg.avatar) }}"

onclick="abrirImagem(this.src)"

>

{% else %}

<div

class="avatar-default"

onclick="abrirImagem('/static/img/default-avatar.png')"

>

{{ msg.username[0]|upper }}

</div>

{% endif %}

<a href="{{ url_for('perfil.perfil', user_id=msg.user_id) }}">

{{ msg.username }}

</a>

</div>

{{ msg.content }}

</div>

{% endfor %}

{% else %}

<p>Nenhuma mensagem ainda.</p>

{% endif %}

</div>

<form id="chat-form" method="POST">

<input

type="text"

name="content"

placeholder="Digite sua mensagem..."

required

>

<input

type="hidden"

name="destino"

value="chat"

>

<button type="submit">

Enviar

</button>

</form>

<div id="imageModal" onclick="fecharImagem()">

<img id="expandedImage">

</div>

<script>

function abrirImagem(src){

document.getElementById(
"expandedImage"
).src=src;

document.getElementById(
"imageModal"
).style.display="flex";

}

function fecharImagem(){

document.getElementById(
"imageModal"
).style.display="none";

}

</script>

</body>
</html>
